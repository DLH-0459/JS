<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Base64 Encode/Decode</title>

        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="ROBOTS" content="ALL" />

        <style>
        .column
        {
            height: 100%;
        }
        
        .row
        {
            display: grid;
            grid-template-columns: 1fr 200px 1fr;
        }

        .row [class*="meta"]
        {
            color: white;
        }

        .row .meta-right
        {
            text-align: right;
        }

        .row .logo-bg-top
        {
            background: red;
        }

        textarea
        {
            width: 100%;
            height: 100%;
            -webkit-box-sizing: border-box; /* Safari/Chrome, other WebKit */
            -moz-box-sizing: border-box;    /* Firefox, other Gecko */
            box-sizing: border-box;         /* Opera/IE 8+ */
        }
        </style>

        <script type="text/javascript">
        //<![CDATA[
        
        if (typeof(window.jQuery) === "undefined")
        {
            document.write('<scr' + 'ipt type="text/javascript src="jquery.min.js"></scr' + 'ipt>');
        }
        
        //]]>
        </script>
    </head>
    <body>
        <div class="row">
            <div class="column meta-left">
                <textarea id="input" spellcheck="false" placeholder="Enter here&hellip;" style="width: 100%; height: 100%;"></textarea>
            </div>
            <div class="column logo-bg-top"></div>
            <div class="column meta-right">
                <textarea id="input" spellcheck="false" placeholder="Enter here&hellip;" style="width: 100%; height: 100%;"></textarea>
            </div>
        </div>
    </body>
</html>
